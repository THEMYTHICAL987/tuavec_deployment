<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shopping Cart - Tu Avec">
    <title>Shopping Cart - Tu Avec</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --chocolate: #3e2723;
            --rose-gold: #b76e79;
            --gold: #d4af37;
            --bg-dark: #161616;
            --bg-card: #222222;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.2);
            --shadow-lg: 0 15px 35px rgba(183,110,121,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* ========== HEADER ========== */
        header {
            background: rgba(22,22,22,0.98);
            padding: 20px 0;
            border-bottom: 1px solid rgba(62,39,35,0.4);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* ========== PAGE HEADER ========== */
        .page-header {
            background: linear-gradient(135deg, rgba(183,110,121,0.1), rgba(212,175,55,0.1));
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 48px;
            font-family: 'Playfair Display', serif;
        }

        /* ========== MAIN LAYOUT ========== */
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            margin-bottom: 60px;
        }

        /* ========== CART ITEMS ========== */
        .cart-items {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(183,110,121,0.2);
            padding: 30px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr auto auto;
            gap: 20px;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(183,110,121,0.1);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .cart-item-info p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            background: rgba(183,110,121,0.2);
            border: 1px solid rgba(183,110,121,0.5);
            color: var(--text-light);
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .qty-btn:hover {
            background: var(--rose-gold);
        }

        .qty-input {
            width: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(183,110,121,0.3);
            color: var(--text-light);
            padding: 6px;
            border-radius: 6px;
            text-align: center;
        }

        .cart-item-price {
            text-align: right;
            min-width: 100px;
        }

        .item-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--rose-gold);
            margin-bottom: 5px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 16px;
            padding: 5px 10px;
        }

        .remove-btn:hover {
            opacity: 0.8;
        }

        /* ========== EMPTY CART ========== */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-cart-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .continue-shopping {
            display: inline-block;
            background: linear-gradient(135deg, var(--rose-gold), #d4697a);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 600;
        }

        /* ========== SUMMARY SIDEBAR ========== */
        .order-summary {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(183,110,121,0.2);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .summary-row.total {
            border-top: 2px solid rgba(183,110,121,0.2);
            padding-top: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--rose-gold);
        }

        .promo-input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(183,110,121,0.3);
            border-radius: 8px;
            color: var(--text-light);
            margin-bottom: 10px;
            font-size: 13px;
        }

        .apply-promo {
            width: 100%;
            background: rgba(183,110,121,0.3);
            border: none;
            color: var(--text-light);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .apply-promo:hover {
            background: rgba(183,110,121,0.5);
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--success), #45a049);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(76,175,80,0.3);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .trust-info {
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-muted);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 15px;
            }

            .quantity-control,
            .cart-item-price {
                grid-column: 2;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Tu Avec</a>
                <div style="display: flex; gap: 20px;">
                    <a href="shop.html" style="color: var(--text-light); text-decoration: none;">Back to Shop</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>Shopping Cart</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="cart-layout">
            <!-- Cart Items -->
            <div class="cart-items" id="cartContainer">
                <!-- Items will be loaded here -->
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <h3 class="summary-title">Order Summary</h3>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">৳0</span>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="shipping">৳0</span>
                </div>

                <div class="summary-row">
                    <span>Discount</span>
                    <span id="discount" style="color: var(--success);">৳0</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">৳0</span>
                </div>

                <input type="text" class="promo-input" id="promoCode" placeholder="Promo code">
                <button class="apply-promo" onclick="applyPromo()">Apply Promo</button>

                <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">
                    Proceed to Checkout
                </button>

                <div class="trust-info">
                    ✅ 100% Secure Payment<br>
                    🚚 Free Shipping on Orders >2000৳<br>
                    💰 30-Day Money-Back Guarantee
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Load cart on page load
        window.addEventListener('load', () => {
            renderCart();
        });

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartContainer = document.getElementById('cartContainer');

            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h2>Your cart is empty</h2>
                        <p>Start shopping to add items to your cart</p>
                        <a href="shop.html" class="continue-shopping">Continue Shopping</a>
                    </div>
                `;
                document.getElementById('checkoutBtn').disabled = true;
                return;
            }

            let html = '';
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <img src="${item.image || 'https://via.placeholder.com/100'}" alt="${item.name}">
                        </div>
                        <div class="cart-item-info">
                            <h3>${item.name}</h3>
                            <p>৳${item.price} per item</p>
                        </div>
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                            <input type="number" class="qty-input" value="${item.quantity}" min="1" onchange="setQuantity(${index}, this.value)">
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="cart-item-price">
                            <div class="item-total">৳${itemTotal}</div>
                            <button class="remove-btn" onclick="removeItem(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            cartContainer.innerHTML = html;
            updateSummary();
        }

        function updateQuantity(index, change) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += change;
            
            if (cart[index].quantity < 1) {
                cart.splice(index, 1);
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function setQuantity(index, quantity) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const qty = parseInt(quantity) || 1;
            
            if (qty < 1) {
                cart.splice(index, 1);
            } else {
                cart[index].quantity = qty;
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function updateSummary() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
            });

            const shipping = subtotal > 2000 ? 0 : 100;
            const discount = 0; // TODO: Apply discount code
            const total = subtotal + shipping - discount;

            document.getElementById('subtotal').textContent = `৳${subtotal}`;
            document.getElementById('shipping').textContent = shipping > 0 ? `৳${shipping}` : 'FREE';
            document.getElementById('discount').textContent = `৳${discount}`;
            document.getElementById('total').textContent = `৳${total}`;
        }

        function applyPromo() {
            alert('Promo code functionality coming soon!');
        }

        function proceedToCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
