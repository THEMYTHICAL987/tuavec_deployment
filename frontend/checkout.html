<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Checkout - Tu Avec">
    <title>Checkout - Tu Avec</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --chocolate: #3e2723;
            --rose-gold: #b76e79;
            --gold: #d4af37;
            --bg-dark: #161616;
            --bg-card: #222222;
            --text-light: #f5f5f5;
            --text-muted: #aaaaaa;
            --success: #4caf50;
            --error: #f44336;
            --warning: #ff9800;
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* ========== HEADER ========== */
        header {
            background: rgba(22,22,22,0.98);
            padding: 20px 0;
            border-bottom: 1px solid rgba(62,39,35,0.4);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--rose-gold), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        /* ========== PAGE HEADER ========== */
        .page-header {
            background: linear-gradient(135deg, rgba(183,110,121,0.1), rgba(212,175,55,0.1));
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 48px;
            font-family: 'Playfair Display', serif;
        }

        /* ========== PROGRESS STEPS ========== */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(183,110,121,0.2);
            z-index: -1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 2px solid rgba(183,110,121,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: var(--rose-gold);
            border-color: var(--rose-gold);
            color: white;
        }

        .step-label {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
        }

        /* ========== MAIN LAYOUT ========== */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            margin-bottom: 60px;
        }

        .checkout-form {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(183,110,121,0.2);
            padding: 30px;
        }

        .form-section {
            margin-bottom: 40px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(183,110,121,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(183,110,121,0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--rose-gold);
            box-shadow: 0 0 15px rgba(183,110,121,0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* ========== PAYMENT METHODS ========== */
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .payment-option {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(183,110,121,0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
        }

        .payment-option:hover {
            border-color: var(--rose-gold);
        }

        .payment-option input[type="radio"] {
            display: none;
        }

        .payment-option input[type="radio"]:checked + .payment-label,
        .payment-option.active {
            background: var(--rose-gold);
            border-color: var(--rose-gold);
            color: white;
        }

        .payment-label {
            cursor: pointer;
            display: block;
        }

        /* ========== ORDER SUMMARY ========== */
        .order-summary {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(183,110,121,0.2);
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .summary-items {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(183,110,121,0.1);
            font-size: 13px;
        }

        .summary-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .summary-row.total {
            border-top: 2px solid rgba(183,110,121,0.2);
            padding-top: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--rose-gold);
        }

        .place-order-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--success), #45a049);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .place-order-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(76,175,80,0.3);
        }

        .place-order-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .security-info {
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .progress-steps {
                margin-bottom: 20px;
            }

            .payment-methods {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">Tu Avec</a>
                <div style="display: flex; gap: 20px;">
                    <a href="shop.html" style="color: var(--text-light); text-decoration: none;">Back to Shop</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>Checkout</h1>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Progress Steps -->
        <div class="progress-steps">
            <div class="step active">
                <div class="step-number">1</div>
                <div class="step-label">Shipping</div>
            </div>
            <div class="step">
                <div class="step-number">2</div>
                <div class="step-label">Payment</div>
            </div>
            <div class="step">
                <div class="step-number">3</div>
                <div class="step-label">Confirmation</div>
            </div>
        </div>

        <!-- Checkout Layout -->
        <div class="checkout-layout">
            <!-- Checkout Form -->
            <form class="checkout-form" id="checkoutForm" onsubmit="submitOrder(event)">
                <!-- SHIPPING INFORMATION -->
                <div class="form-section">
                    <h3 class="form-title">Shipping Information</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="fullName" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" placeholder="+8801XXXXXXXXX" required>
                    </div>

                    <div class="form-group">
                        <label>Region/Division *</label>
                        <select id="region" required onchange="updateShipping()">
                            <option value="">Select Division</option>
                            <option value="Dhaka">Dhaka</option>
                            <option value="Chittagong">Chittagong</option>
                            <option value="Sylhet">Sylhet</option>
                            <option value="Khulna">Khulna</option>
                            <option value="Rajshahi">Rajshahi</option>
                            <option value="Barishal">Barishal</option>
                            <option value="Rangpur">Rangpur</option>
                            <option value="Mymensingh">Mymensingh</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>City/Area *</label>
                        <input type="text" id="city" required>
                    </div>

                    <div class="form-group">
                        <label>Full Address *</label>
                        <textarea id="address" rows="3" required></textarea>
                    </div>
                </div>

                <!-- PAYMENT METHOD -->
                <div class="form-section">
                    <h3 class="form-title">Payment Method</h3>

                    <div class="payment-methods">
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="sslcommerz" checked onchange="updatePaymentUI()">
                            <div class="payment-label">
                                <i class="fas fa-credit-card"></i><br>
                                Card / SSLCommerz
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="bkash" onchange="updatePaymentUI()">
                            <div class="payment-label">
                                <i class="fas fa-mobile-alt"></i><br>
                                bKash
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="nagad" onchange="updatePaymentUI()">
                            <div class="payment-label">
                                <i class="fas fa-mobile-alt"></i><br>
                                Nagad
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="paymentMethod" value="cod" onchange="updatePaymentUI()">
                            <div class="payment-label">
                                <i class="fas fa-hand-holding-usd"></i><br>
                                Cash on Delivery
                            </div>
                        </label>
                    </div>

                    <div id="paymentDetails"></div>
                </div>

                <!-- TERMS & CONDITIONS -->
                <div class="form-section">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="terms" required> I agree to the Terms & Conditions and Privacy Policy
                        </label>
                    </div>
                </div>
            </form>

            <!-- Order Summary -->
            <div class="order-summary">
                <h3 class="summary-title">Order Summary</h3>

                <div class="summary-items" id="summaryItems"></div>

                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">৳0</span>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="summaryShipping">৳0</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summaryTotal">৳0</span>
                </div>

                <button class="place-order-btn" onclick="submitOrder(event)">
                    <span id="btnText">Place Order</span>
                </button>

                <div class="security-info">
                    🔒 Your payment information is secure and encrypted
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Load cart and initialize checkout
        window.addEventListener('load', () => {
            loadCart();
            updatePaymentUI();
        });

        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let subtotal = 0;

            if (cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }

            // Render items
            let itemsHTML = '';
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                itemsHTML += `
                    <div class="summary-item">
                        <span>${item.name} x${item.quantity}</span>
                        <span>৳${itemTotal}</span>
                    </div>
                `;
            });

            document.getElementById('summaryItems').innerHTML = itemsHTML;
            updateShipping();
        }

        function updateShipping() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
            });

            const region = document.getElementById('region').value;
            const shippingCost = region === 'Dhaka' ? 80 : 150;

            document.getElementById('summarySubtotal').textContent = `৳${subtotal}`;
            document.getElementById('summaryShipping').textContent = shippingCost > 0 ? `৳${shippingCost}` : 'FREE';
            document.getElementById('summaryTotal').textContent = `৳${subtotal + shippingCost}`;
        }

        function updatePaymentUI() {
            const method = document.querySelector('input[name="paymentMethod"]:checked').value;
            const detailsDiv = document.getElementById('paymentDetails');

            if (method === 'cod') {
                detailsDiv.innerHTML = `
                    <div style="background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); padding: 15px; border-radius: 8px; font-size: 13px;">
                        💵 Pay when your order arrives. No charges now.
                    </div>
                `;
            } else if (method === 'bkash') {
                detailsDiv.innerHTML = `
                    <div class="form-group">
                        <label>bKash Account Number *</label>
                        <input type="tel" placeholder="0171XXXXXXXX" id="bkashNumber">
                    </div>
                `;
            } else if (method === 'nagad') {
                detailsDiv.innerHTML = `
                    <div class="form-group">
                        <label>Nagad Account Number *</label>
                        <input type="tel" placeholder="0161XXXXXXXX" id="nagadNumber">
                    </div>
                `;
            } else {
                detailsDiv.innerHTML = `
                    <div style="background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); padding: 15px; border-radius: 8px; font-size: 13px;">
                        💳 You'll be redirected to a secure payment gateway
                    </div>
                `;
            }
        }

        async function submitOrder(event) {
            event.preventDefault();

            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

            const orderData = {
                customer: {
                    name: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value
                },
                shippingAddress: {
                    region: document.getElementById('region').value,
                    city: document.getElementById('city').value,
                    address: document.getElementById('address').value
                },
                items: cart.map(item => ({
                    productId: item.productId,
                    quantity: item.quantity
                })),
                paymentMethod: paymentMethod
            };

            try {
                const response = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const data = await response.json();

                if (data.success) {
                    if (paymentMethod === 'sslcommerz') {
                        // Redirect to payment gateway
                        window.location.href = data.paymentURL;
                    } else if (paymentMethod === 'cod') {
                        // Clear cart and show success
                        localStorage.removeItem('cart');
                        window.location.href = `order-success.html?orderId=${data.order._id}`;
                    } else {
                        alert('Order created! Mobile payment instructions coming soon.');
                    }
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Checkout error:', error);
                alert('Failed to process order');
            }
        }
    </script>
</body>
</html>
